name: Publish NuGet Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.408"

      - name: Show .NET info
        run: dotnet --info

      - name: Derive package version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Publishing version: $VERSION"

      - name: Restore dependencies
        run: dotnet restore

      - name: Pack
        run: dotnet pack -c Release --no-restore --output ./artifacts /p:PackageVersion=${{ env.PACKAGE_VERSION }}

      - name: Authenticate with NuGet trusted publishing
        id: nuget-auth
        uses: NuGet/login@v1
        with:
          user: svanrj

      - name: Publish packages to NuGet
        env:
          NUGET_API_KEY: ${{ steps.nuget-auth.outputs.NUGET_API_KEY }}
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate --timeout 1200
